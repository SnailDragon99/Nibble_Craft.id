<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibble Craft</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--mango:#ffb703;--cream:#fffaf2;--dark:#5a3825}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,sans-serif;background:var(--cream);color:var(--dark)}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 5%;background:#fff;position:sticky;top:0;z-index:100}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-family:'Fredoka',sans-serif;
    font-size:2rem;
    font-weight:700;
}

.logo img{
    width:55px;
    height:55px;
    object-fit:contain;
}

.logo span{
    color:#FFB703;
}
.hero{padding:40px 5%;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero img{width:100%;max-width:500px;margin:auto}
.title{font:700 4rem Fredoka,sans-serif}
.badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--mango);
    padding:12px 20px;
    border-radius:999px;
    font-weight:700;
    width:fit-content;
    white-space:nowrap;
}
.btn{text-decoration:none;color:#000;display:inline-block}
.products{padding:60px 5%}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
.card{background:#fff;padding:20px;border-radius:20px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.08);width:250px;text-align:center}
.card img{width:180px;height:180px;object-fit:contain}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
.modal-content{background:#fff;padding:25px;border-radius:20px;width:90%;max-width:500px;max-height:90vh;overflow:auto}
input,textarea,button{width:100%;padding:12px;margin-top:10px}
button{border:none;border-radius:10px;background:var(--mango);font-weight:700;cursor:pointer}
footer{text-align:center;padding:40px;background:var(--dark);color:#fff}
@media(max-width:900px){.hero{grid-template-columns:1fr}.title{font-size:2.5rem}}
</style>
</head>
<body>

<nav>
<div class="logo">
<img src="images/logo.webp">
<span>Nibble Craft</span>
</div>

<div style="display:flex;gap:10px;align-items:center;">
<button onclick="openTrackingModal()">📦 Cek Pesanan</button>
<div class="cart-btn" onclick="openCart()" style="cursor:pointer; font-size:1.2rem;">
🛒 <span id="cartCount">0</span>
</div>
</div>
</nav>

<section class="hero">
<div><img id="heroImg" src="images/hero-mango.webp"></div>
<div>
<div class="badge">Mulai <span id="heroPrice">10K</span></div>
<h1 class="title" id="heroTitle">Mango Sticky Rice</h1>
<p id="heroDesc">Mangga segar premium dipadukan dengan ketan pulen.</p>
</div>
</section>

<section class="products">
<h2 style="text-align:center;margin-bottom:30px">Menu Favorit</h2>
<div class="grid" id="productGrid"></div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<img id="mImg" style="width:200px;display:block;margin:auto">
<h2 id="mTitle"></h2>
<p id="mPrice"></p>
<input type="number" id="qty" value="1" min="1" oninput="updateTotal()">
<p>Total: Rp <span id="total">0</span></p>
<button onclick="addToCart()">Tambah ke Keranjang</button>
<button onclick="closeModal()">Tutup</button>
</div>
</div>

<div class="modal" id="cartModal">
<div class="modal-content">
<h2>Keranjang Belanja</h2>
<div id="cartItems"></div>
<h3>Total Rp <span id="cartTotal">0</span></h3>
<input id="customerName" placeholder="Nama Lengkap">
<input id="customerPhone" placeholder="Nomor HP">
<textarea id="customerAddress" placeholder="Alamat Lengkap"></textarea>
<button onclick="checkoutFirebase()">Buat Pesanan</button>
<button onclick="closeCart()">Tutup</button>
</div>
</div>

<div class="modal" id="trackingModal">
<div class="modal-content">
<h2>Cek Status Pesanan</h2>
<input type="text" id="trackingNumber" placeholder="Nomor Pesanan">
<button onclick="checkOrder()">Cek Status</button>
<div id="trackingResult" style="margin-top:20px;"></div>
<button style="margin-top:15px; background:#ddd;" onclick="closeTrackingModal()">Tutup</button>
</div>
</div>

<footer>Nibble Craft</footer>

<script>
const products=[
{id:1,title:'Mango Sticky Rice',price:10000,priceLabel:'10K',img:'images/hero-mango.webp',desc:'Mangga segar premium dipadukan dengan ketan pulen.'},
{id:2,title:'Tiramisu Mini',price:7000,priceLabel:'7K',img:'images/tiramisu-mini.webp',desc:'Cream lembut dengan rasa kopi yang pas.'}
];

// Menempelkan variabel ke window agar bisa diakses oleh <script type="module">
window.cart=[];
let currentProduct=null;

function renderProducts(){
const productGrid = document.getElementById('productGrid');
productGrid.innerHTML='';
products.forEach(p=>{
productGrid.innerHTML+=`
<div class="card" onclick="openModal(${p.id})">
<img src="${p.img}">
<h3>${p.title}</h3>
<p>Rp ${p.price.toLocaleString('id-ID')}</p>
</div>`;
});
}
renderProducts();

function openModal(id){
currentProduct=products.find(p=>p.id===id);
mImg.src=currentProduct.img;
mTitle.innerText=currentProduct.title;
mPrice.innerText='Harga Rp '+currentProduct.price.toLocaleString('id-ID');
qty.value=1;
updateTotal();
modal.style.display='flex';
}
window.closeModal = function(){modal.style.display='none';}
window.updateTotal = function(){
total.innerText=(currentProduct.price*(parseInt(qty.value)||1)).toLocaleString('id-ID');
}
window.addToCart = function(){
const q=parseInt(qty.value)||1;
const e=window.cart.find(i=>i.id===currentProduct.id);
if(e){e.qty+=q}else{window.cart.push({...currentProduct,qty:q})}
window.updateCartCount();
closeModal();
}
window.updateCartCount = function(){
cartCount.innerText=window.cart.reduce((a,b)=>a+b.qty,0);
}
window.openCart = function(){renderCart();cartModal.style.display='flex';}
window.closeCart = function(){cartModal.style.display='none';}
window.renderCart = function(){
let totalHarga=0;
cartItems.innerHTML=window.cart.map((i,idx)=>{
const sub=i.price*i.qty; totalHarga+=sub;
return `<div>${i.title} (${i.qty}) - Rp ${sub.toLocaleString('id-ID')} <button onclick="removeCart(${idx})" style="width:auto; padding:2px 8px; margin:0 0 0 10px;">Hapus</button></div>`;
}).join('');
cartTotal.innerText=totalHarga.toLocaleString('id-ID');
}
window.removeCart = function(i){window.cart.splice(i,1);window.updateCartCount();window.renderCart();}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
serverTimestamp,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBP1Z5Rx-Cx9HQSL2WZMLSZvFfbHRDzOik",
  authDomain: "nibble-craft.firebaseapp.com",
  projectId: "nibble-craft",
  storageBucket: "nibble-craft.firebasestorage.app",
  messagingSenderId: "171122979920",
  appId: "1:171122979920:web:e2ff146cf821c7d152cd55",
  measurementId: "G-ZM5N14D8HV"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.checkoutFirebase=async()=>{
if(window.cart.length===0) return alert('Keranjang kosong');

const customerName=document.getElementById('customerName').value.trim();
const customerPhone=document.getElementById('customerPhone').value.trim();
const customerAddress=document.getElementById('customerAddress').value.trim();

if(!customerName || !customerPhone || !customerAddress){
  return alert('Mohon lengkapi data pengiriman');
}

const total=window.cart.reduce((a,b)=>a+(b.price*b.qty),0);
const orderNumber = "NC-" + Date.now();

try {
  const docRef = await addDoc(
  collection(db,"orders"),
  {
  orderNumber,
  customerName,
  customerPhone,
  customerAddress,
  items:window.cart,
  total,
  status:"Menunggu",
  createdAt:serverTimestamp()
  }
  );

  alert(
  "Pesanan berhasil dibuat!\n\n" +
  "Nomor Pesanan:\n" +
  orderNumber +
  "\n\nSimpan nomor ini untuk cek status pesanan."
  );
  
  window.cart = [];
  window.updateCartCount();
  window.renderCart();
  window.closeCart();
} catch (error) {
  console.error("Error adding document: ", error);
  alert("Gagal membuat pesanan, silahkan coba lagi.");
}
}; 

window.openTrackingModal = ()=>{
document.getElementById("trackingModal").style.display = "flex";
};

window.closeTrackingModal = ()=>{
document.getElementById("trackingModal").style.display = "none";
document.getElementById("trackingResult").innerHTML = "";
document.getElementById("trackingNumber").value = "";
};

window.checkOrder = async()=>{
const orderNumber = document.getElementById("trackingNumber").value.trim();

if(!orderNumber){
alert("Masukkan nomor pesanan");
return;
}

const q = query(
collection(db,"orders"),
where("orderNumber", "==", orderNumber)
);

const snapshot = await getDocs(q);
const result = document.getElementById("trackingResult");

if(snapshot.empty){
result.innerHTML = "<p>❌ Pesanan tidak ditemukan</p>";
return;
}

result.innerHTML = ""; // Reset kontainer terlebih dahulu
snapshot.forEach(doc=>{
const data = doc.data();
result.innerHTML = `
<div style="text-align:left; background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #eee;">
<h3 style="color:green; margin-bottom:10px;">✅ Pesanan Ditemukan</h3>
<p><b>No Pesanan:</b> ${data.orderNumber}</p>
<p><b>Nama:</b> ${data.customerName}</p>
<p><b>Status:</b> <span style="background:orange; color:white; padding:2px 6px; border-radius:5px;">${data.status}</span></p>
<p><b>Total:</b> Rp ${data.total.toLocaleString('id-ID')}</p>
</div>
`;
});
};
</script>
</body>
</html>
