<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibble Craft</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/logo.png">
<style>
:root{--mango:#ffb703;--mint:#8ee3ef;--cream:#fffaf2;--dark:#5a3825;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,sans-serif;background:var(--cream);color:var(--dark)}
nav{display:flex;justify-content:space-between;padding:20px 5%;position:sticky;top:0;background:#ffffffdd;backdrop-filter:blur(8px)}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-family:'Fredoka',sans-serif;
    font-size:2rem;
    font-weight:700;
}

.logo img{
    width:55px;
    height:55px;
    object-fit:contain;
}

.logo span{
    color:#FFB703;
}
.hero{padding:40px 5%;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero img{width:100%;max-width:550px;display:block;margin:auto;transition:.8s}
.title{font:700 4rem Fredoka,sans-serif}
.badge{display:inline-block;background:var(--mango);padding:15px 25px;border-radius:999px;font-weight:700;margin-bottom:15px}
.desc{background:#fff;padding:20px;border-radius:20px;margin:15px 0}
.btn{display:inline-block;background:var(--mango);padding:14px 24px;border-radius:999px;color:#000;text-decoration:none;font-weight:700}
.products{padding:80px 5%}
.products h2{text-align:center;font:700 3rem Fredoka,sans-serif;margin-bottom:80px}
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}
.card{background:#fff;border-radius:30px;padding:25px;text-align:center;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.card img{width:180px;height:180px;object-fit:contain}
.price{font-weight:700;color:#ff7b00}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:25px;border-radius:25px;max-width:450px;width:90%}
.modal-content img{width:220px;display:block;margin:auto}
input{width:100%;padding:12px;margin:10px 0}
button{width:100%;padding:14px;background:var(--mango);border:none;border-radius:15px;font-weight:700;cursor:pointer}
footer{text-align:center;padding:40px;background:var(--dark);color:#fff}
@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}.title{font-size:2.8rem}}
.footer-logo{
    margin-bottom:20px;
}

.footer-logo img{
    width:90px;
    height:90px;
    object-fit:contain;
}

</style>
</head>
<body>

<nav>
<div class="logo">
    <img src="images/logo.png" alt="Nibble Craft Logo">
    <span>Nibble Craft</span>
</div>
<div>📞 08883923632</div>
</nav>

<section class="hero">
<div><img id="heroImg" src="images/hero-mango.png"></div>
<div>
<div class="badge">Mulai <span id="heroPrice">10K</span></div>
<h1 id="heroTitle" class="title">Mango Sticky Rice</h1>
<div class="desc" id="heroDesc">Mangga segar premium dipadukan dengan ketan pulen dan saus santan gurih.</div>
<a href="#menu" class="btn">Lihat Menu</a>
</div>
</section>

<section class="products" id="menu">
<h2>Menu Favorit</h2>
<div class="grid">

<div class="grid" id="productGrid">

</div>



</div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<img id="mImg">
<h2 id="mTitle"></h2>
<p id="mPrice"></p>
<input type="number" id="qty" min="1" value="1" oninput="updateTotal()">
<p>Total: Rp <span id="total"></span></p>
<button onclick="orderWA()">Pesan Sekarang</button>
<button style="margin-top:10px;background:#ddd" onclick="closeModal()">Tutup</button>
</div>
</div>

<footer>
<footer>

<div class="footer-logo">
    <img src="images/logo.png" alt="Nibble Craft">
</div>

<h2>Nibble Craft</h2>

<p>Dessert & Snack Homemade Premium</p>

<p>Instagram : @Nibble_Craft.id</p>
<p>TikTok : @Nibble_Craft.id</p>

</footer>
<script>

// ======================
// DATA PRODUK
// ======================

const products = [

{
id:1,
title:'Mango Sticky Rice',
price:10000,
priceLabel:'10K',
img:'images/hero-mango.png',
desc:'Mangga segar premium dipadukan dengan ketan pulen dan saus santan gurih.'
},

{
id:2,
title:'Tiramisu Mini',
price:7000,
priceLabel:'7K',
img:'images/tiramisu-mini.png',
desc:'Ukuran praktis dengan cream lembut dan rasa kopi yang pas.'
},

];

// ======================
// GENERATE KATALOG
// ======================

function renderProducts(){

const grid =
document.getElementById("productGrid");

grid.innerHTML = "";

products.forEach(product=>{

grid.innerHTML += `

<div class="card"
onclick="openModal(${product.id})">

<img src="${product.img}" alt="${product.title}">

<h3>${product.title}</h3>

<div class="price">
Rp ${product.price.toLocaleString('id-ID')}
</div>

</div>

`;

});

}

renderProducts();


// ======================
// HERO SLIDER
// ======================

let currentHero = 0;

function updateHero(){

const product =
products[currentHero];

document.getElementById("heroImg").src =
product.img;

document.getElementById("heroTitle").innerText =
product.title;

document.getElementById("heroPrice").innerText =
product.priceLabel;

document.getElementById("heroDesc").innerText =
product.desc;

}

updateHero();

setInterval(()=>{

currentHero++;

if(currentHero >= products.length){

currentHero = 0;

}

updateHero();

},10000);


// ======================
// MODAL PRODUK
// ======================

let currentProduct = null;

function openModal(id){

currentProduct =
products.find(product => product.id === id);

document.getElementById("mTitle").innerText =
currentProduct.title;

document.getElementById("mPrice").innerText =
"Harga Rp " +
currentProduct.price.toLocaleString('id-ID');

document.getElementById("mImg").src =
currentProduct.img;

document.getElementById("qty").value = 1;

updateTotal();

document.getElementById("modal").style.display =
"flex";

}


// ======================
// CLOSE MODAL
// ======================

function closeModal(){

document.getElementById("modal").style.display =
"none";

}


// ======================
// TOTAL HARGA
// ======================

function updateTotal(){

if(!currentProduct) return;

const qty =
parseInt(document.getElementById("qty").value)
|| 1;

const totalHarga =
currentProduct.price * qty;

document.getElementById("total").innerText =
totalHarga.toLocaleString('id-ID');

}


// ======================
// ORDER WA
// ======================

function orderWA(){

const qty =
parseInt(document.getElementById("qty").value)
|| 1;

const totalHarga =
currentProduct.price * qty;

const pesan =

`Halo Nibble Craft 👋

Saya ingin memesan:

🍰 Produk : ${currentProduct.title}

📦 Jumlah : ${qty}

💰 Total : Rp ${totalHarga.toLocaleString('id-ID')}

Mohon info ketersediaannya.
Terima kasih 🙏`;

window.open(

'https://wa.me/628883923632?text=' +
encodeURIComponent(pesan),

'_blank'

);

}


// ======================
// CLOSE MODAL JIKA KLIK LUAR
// ======================

window.addEventListener('click', function(e){

const modal =
document.getElementById('modal');

if(e.target === modal){

closeModal();

}

});

</script>
</body>
</html>
